<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key-Sound Piano</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        textarea {
            width: 400px;
            height: 200px;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            resize: none;
        }
        h1 {
            font-size: 48px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            text-align: center;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Key-Sound Piano</h1>
    <p>Start typing in the box below! Each key press will play a random sound effect.</p>
    <textarea placeholder="Type here..."></textarea>
    <script src="key-sound-piano.js"></script>
</body>
</html>
