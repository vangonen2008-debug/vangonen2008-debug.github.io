<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Edge Warp</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        .warp-object {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            border-radius: 50%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            cursor: grab;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.3s ease;
        }
        .warp-object:active {
            cursor: grabbing;
        }
        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }
        p {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }
    </style>
</head>
<body>
    <h1>Screen Edge Warp</h1>
    <p>Drag the ball around! When it reaches the edge, it warps to the opposite side like Pac-Man.</p>
    <div class="warp-object">Drag Me</div>
    <script src="screen-edge-warp.js"></script>
</body>
</html>
