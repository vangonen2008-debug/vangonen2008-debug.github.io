<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shadow Follow</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        h1, h2 {
            font-size: 48px;
            text-align: center;
            margin: 20px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: text-shadow 0.1s ease;
        }
        h2 {
            font-size: 36px;
        }
        p {
            font-size: 18px;
            text-align: center;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Text Shadow Follow</h1>
    <p>Move your mouse around! The shadows follow the 'light' source.</p>
    <h2>Heading 1</h2>
    <h2>Heading 2</h2>
    <h2>Heading 3</h2>
    <script src="text-shadow-follow.js"></script>
</body>
</html>
