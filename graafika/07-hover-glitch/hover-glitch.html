<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Glitch Effect</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .glitch-image {
            width: 400px;
            height: 300px;
            margin: 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }
        .glitch-image:hover {
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        }
        .glitch {
            animation: shake 0.5s infinite;
            filter: hue-rotate(180deg) saturate(2);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        h1 {
            font-size: 36px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            text-align: center;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Hover Glitch Effect</h1>
    <p>Hover over the image below to see the glitch effect in action!</p>
    <img src="myimage.jpg" class="glitch-image" alt="My Image">
    <script src="hover-glitch.js"></script>
</body>
</html>
