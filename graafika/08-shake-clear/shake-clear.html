<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shake to Clear</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .shake-element {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            margin: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }
        .fall {
            animation: fallDown 1s ease-in forwards;
        }
        @keyframes fallDown {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) scale(0.5); opacity: 0; }
        }
        .shake-element:hover {
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="shake-element">Element 1</div>
    <div class="shake-element">Element 2</div>
    <div class="shake-element">Element 3</div>
    <script src="shake-clear.js"></script>
</body>
</html>
