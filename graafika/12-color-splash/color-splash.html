<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Splash</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            cursor: crosshair;
        }
        .splash {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }
        .fade {
            opacity: 0 !important;
        }
        h1 {
            font-size: 48px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }
        p {
            font-size: 20px;
            text-align: center;
            max-width: 600px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Color Splash</h1>
    <p>Click and hold the mouse button to create a growing color splash that lights up under your cursor!</p>
    <script src="color-splash.js"></script>
</body>
</html>
